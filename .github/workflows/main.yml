name: Deploy Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # renovate: datasource=github-releases depName=gohugoio/hugo extractVersion=^v(?<version>.+)$
      HUGO_VERSION: 0.160.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Hugo CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "v${HUGO_VERSION}" \
            --repo gohugoio/hugo \
            --pattern "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            --dir "${RUNNER_TEMP}"
          tar -xzf "${RUNNER_TEMP}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" -C "${RUNNER_TEMP}"
          sudo install -m 0755 "${RUNNER_TEMP}/hugo" /usr/local/bin/hugo
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --theme=bota --destination ./public
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: harringa-site
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout (for s3_website.yml)
        uses: actions/checkout@v4
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: harringa-site
          path: ./public
      - name: Deploy to S3
        # renovate: datasource=docker depName=justinharringa/s3_website
        uses: docker://justinharringa/s3_website@sha256:ca5b551964886b6bc563d9e87a44ca53f9db242d786ea01d69b669b5eb6611c5
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_CLOUDFRONT_DISTRIBUTION: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION }}
          S3_BUCKET: www.harringa.com
        with:
          args: push --site public
